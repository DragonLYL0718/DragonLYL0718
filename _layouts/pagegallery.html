---
layout: page
---

<head>
    <style>
    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 0.33fr));
        gap: 20px;
    }

    .figure-grid {
        column-count: 3; /* 三列布局 */
        column-gap: 20px; /* 列之间的间隙 */
        row-gap: 20px; /* 行之间的间隙 */
        max-width: 100%; /* 确保容器不会超过其父元素的宽度 */
        margin: 0 auto; /* 水平居中 */
    }

    .figure-grid img {
        width: 100%; /* 使图片响应式 */
        break-inside: avoid; /* 防止图片在列中断开 */
        margin-bottom: 20px; /* 图片间的间距 */
    }

    .figure-grid a {
        text-decoration: none; /* 移除链接下划线 */
        border: none; /* 移除链接边框 */
        outline: none; /* 移除点击时的轮廓 */
    }

    .figure-grid a img {
        display: block; /* 防止图片下方出现间隙 */
        width: 100%; /* 使图片响应式 */
        break-inside: avoid; /* 防止图片在列中断开 */
        margin-bottom: 20px; /* 图片间的间距 */
    }

    .figure-grid a::after {
        content: none !important;; /* 移除伪元素的内容 */
    }   

    /* 可选：针对小屏幕调整列数 */
    @media screen and (max-width: 768px) {
        .figure-grid {
            grid-template-columns: repeat(auto-fit, minmax(250px, 0.5fr));
        }
        .figure-grid {
            column-count: 2;
        }
    }

    @media screen and (max-width: 480px) {
        .figure-grid {
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }
        .figure-grid {
            column-count: 1;
        }
    }
    
    .card {
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        transition: all 0.3s ease;
    }
    
    .card:hover {
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }
    
    .card img {
        width: 100%;
        height: auto;
        display: block;
        object-fit: cover;
        aspect-ratio: 3 / 2;
    }
    
    .card-text {
        padding: 15px;
        text-align: center;
    }
    </style>
</head>

<body>
    <!-- <script src="/assets/js/gallery.js"></script> -->
    {{ content }}
</body>
