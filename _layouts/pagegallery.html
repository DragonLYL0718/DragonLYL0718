---
layout: page
---

<head>
    <style>
    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 0.5fr));
        gap: 20px;
    }

    .figure-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 0.5fr));
        gap: 20px 20px;
    }
    
    .card {
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        transition: all 0.3s ease;
    }
    
    .card:hover {
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }
    
    .card img {
        width: 100%;
        height: auto;
        display: block;
    }
    
    .card-text {
        padding: 15px;
        text-align: center;
    }
    </style>
</head>

<body>
    {{ content }}
</body>
