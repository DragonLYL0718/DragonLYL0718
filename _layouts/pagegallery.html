---
layout: page

<head>
    <style>
    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 0.33fr));
        gap: 20px;
    }

    .card {
        background: var(--body-card);
        color: var(--body-cardcolor);
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        overflow: hidden;
        transition: all 0.3s ease;
    }
    
    .card:hover {
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }
    
    .card img {
        width: 100%;
        height: auto;
        display: block;
        object-fit: cover;
        aspect-ratio: 3 / 2;
    }
    
    .card-text {
        padding: 15px;
        text-align: center;
    }
    </style>
</head>
