---
layout: page
---

<head>
    <style>
        .large-only {
            position: fixed !important; /* 固定位置 */
            top: 20% !important; /* 顶部对齐 */
            overflow-y: auto; /* 如果目录很长，允许滚动 */
        }
    
        .mb6 {
            position: relative; /* 这样才能将下载图标相对于此元素定位 */
        }

        .mb6 .dark-mode-toggle {
            position: absolute;   /* 使用固定定位 */
            top: -120px;        /* 距离页面顶部10px */
            right: 0px;
            width: 40px;      /* 按钮宽度 */
            height: 40px;     /* 按钮高度 */
            opacity: 0.6; /* 半透明 */
            border-radius: 50%; /* 圆形按钮 */
            border: none;     /* 无边框 */
            outline: none;    /* 聚焦时无轮廓 */
            padding: 0;       /* 无内边距 */
            display: flex;    /* 使用Flexbox来居中内容 */
            justify-content: center; /* 水平居中内容 */
            align-items: center;     /* 垂直居中内容 */
            overflow: hidden;        /* 防止内容溢出 */
            background-color: var(--body-card); /* 按钮背景色 */
            cursor: pointer;          /* 鼠标悬停时显示手形指针 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); /* 添加一些阴影效果 */
            z-index: 1000;    /* 确保按钮在页面最上层 */
        }
    
        .dark-mode-toggle:hover {
            opacity: 1; /* 鼠标悬停时增加不透明度 */
        }
    
        .animate-transition {
            transition: background-color 1s, color 1s;
        }
    
        .dark-mode {
            background-color: rgb(42, 45, 47);
            color: rgb(204, 204, 204);
        }
        .dark-mode a {
            color: rgb(204, 204, 204);
        }
    
        :root {
            --body-card: #FFFFFF; /* 明亮模式背景色，默认白色 */
            --body-cardcolor: #000000; /* 明亮模式文字颜色，默认黑色 */
        }
    
        body.dark-mode {
            --body-bg: rgb(42, 45, 47); /* 暗模式背景色 */
            --body-color: rgb(180, 180, 180); /* 暗模式文字颜色 */
            --body-card: rgb(49, 52, 54); /* 暗模式卡片背景色 */
            --body-cardcolor: rgb(204, 204, 204); /* 暗模式卡片文字颜色 */
            background-color: var(--body-bg); /* 使用CSS变量设置背景色 */
            color: var(--body-color); /* 使用CSS变量设置文字颜色 */
        }

        @media screen and (max-width: 1376px) {
            .mb6 .dark-mode-toggle {
                top: -110px; /* 小屏幕上一列布局 */
            }
        }

        @media screen and (max-width: 672px) {
            .mb6 .dark-mode-toggle {
                top: -100px; /* 小屏幕上一列布局 */
            }
        }
    </style>
</head>
  
<body>
    {{ content }}
    <button class="dark-mode-toggle" title="Toggle Dark Mode" style="width: 40px; height: 40px;">
        <svg width="30px" height="30px" viewBox="0 0 24 24" version="1.1" xmlns="http://www.w3.org/2000/svg">
            <g fill="var(--body-cardcolor)" fill-rule="nonzero">
                <path d="M12,22 C17.5228475,22 22,17.5228475 22,12 C22,6.4771525 17.5228475,2 12,2 C6.4771525,2 2,6.4771525 2,12 C2,17.5228475 6.4771525,22 12,22 Z M12,20.5 L12,3.5 C16.6944204,3.5 20.5,7.30557963 20.5,12 C20.5,16.6944204 16.6944204,20.5 12,20.5 Z"></path>
            </g>
        </svg>
    </button>
    <script>
        (function() {
            var darkModeToggles = document.querySelectorAll('.dark-mode-toggle');
            if (darkModeToggles.length === 0) {
                return; 
            }

            var currentMode = localStorage.getItem('darkMode') === 'enabled';
            if (currentMode) {
                document.body.classList.add('dark-mode');
            }

            darkModeToggles.forEach(function(toggle) {
                toggle.addEventListener('click', function() {
                    if (!document.body.classList.contains('animate-transition')) {
                        document.body.classList.add('animate-transition');

                        setTimeout(() => {
                            document.body.classList.toggle('dark-mode');
                            var mode = document.body.classList.contains('dark-mode') ? 'enabled' : 'disabled';
                            localStorage.setItem('darkMode', mode);

                            setTimeout(() => {
                                document.body.classList.remove('animate-transition');
                            }, 1000);
                        }, 0);
                    }
                });
            });

        })();
    </script>
</body>
