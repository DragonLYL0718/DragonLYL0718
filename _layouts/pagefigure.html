---
layout: pagegallery
---

<head>
    <link href="\assets\js\lightbox.css" rel="stylesheet" />
    <style>
    .figure-grid {
        margin: 0 auto; /* 水平居中 */
    }

    .figure-grid img {
        width: 100%; /* 使图片响应式 */
        break-inside: avoid; /* 防止图片在列中断开 */
    }

    .figure-grid a {
        text-decoration: none; /* 移除链接下划线 */
        border: none; /* 移除链接边框 */
        outline: none; /* 移除点击时的轮廓 */
    }

    .figure-grid a img {
        display: block; /* 防止图片下方出现间隙 */
        width: 100%; /* 使图片响应式 */
        break-inside: avoid; /* 防止图片在列中断开 */
    }

    .figure-grid a::after {
        content: none !important;; /* 移除伪元素的内容 */
    }   

    .figure-grid-sizer,
    .figure-grid-item {
        width: 33.333%; /* 三列布局 */
    }

    .figure-grid-item {
        padding: 5px 5px; /* 增加左右内边距 */
        box-sizing: border-box; /* 确保内边距不会增加元素的总宽度 */
    }

    /* 可选：针对小屏幕调整列数 */
    @media screen and (max-width: 768px) {
        .figure-grid-sizer,
        .figure-grid-item {
            width: 50%; /* 小屏幕上一列布局 */
        }
    }

    @media screen and (max-width: 480px) {
        .figure-grid-sizer,
        .figure-grid-item {
            width: 100%; /* 小屏幕上一列布局 */
        }
    }

    .image-link img {
    transition: transform 0.3s ease-in-out; /* 添加平滑的过渡效果 */
    }

    .image-link img:hover {
    transform: scale(1.05); /* 鼠标悬停时放大图片 */
    }
    </style>
</head>

<body>
    {{ content }}
    <!-- 引入 Masonry -->
    <script src="/assets/js/masonry.pkgd.min.js"></script>
    <!-- 引入 imagesLoaded -->
    <script src="/assets/js/imagesloaded.pkgd.min.js"></script>
    <script>
        var grid = document.querySelector('.figure-grid');
        var msnry = new Masonry(grid, {
        itemSelector: '.figure-grid-item',
        columnWidth: '.figure-grid-sizer',
        percentPosition: true
        });

        imagesLoaded(grid).on('progress', function(instance, image) {
            msnry.layout(); 
        }).on('always', function() {
            msnry.layout(); 
        });

        window.addEventListener('load', function() {
            msnry.layout();
        });
    </script>
    <!-- 引入 lightbox -->
    <script src="\assets\js\lightbox-plus-jquery.js"></script>
    <script>
        lightbox.option({
          'resizeDuration': 200,
          'wrapAround': true,
          'fitImagesInViewport': true,
          'disableScrolling': true,
        })
    </script>
</body>
