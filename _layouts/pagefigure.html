---
layout: pagegallery
---

<head>
    <link href="/assets/js/lightbox.css" rel="stylesheet" />
    <script>console.log('页面开始加载');</script>
    <script src="/assets/js/lozad.js"></script>
    <script src="/assets/js/masonry.pkgd.min.js"></script>
    <script src="/assets/js/imagesloaded.pkgd.min.js"></script>
    <style>
        .figure-grid {
            margin: 0 auto;
        }

        .figure-grid img {
            width: 100%;
            break-inside: avoid;
        }

        .figure-grid a {
            text-decoration: none;
            border: none;
            outline: none;
        }

        .figure-grid a img {
            display: block;
            width: 100%;
            break-inside: avoid;
        }

        .figure-grid a::after {
            content: none !important;
        }

        .figure-grid-sizer,
        .figure-grid-item {
            width: 33.333%;
        }

        .figure-grid-item img {
            width: 100%;
            height: auto;
            display: block;
            padding: 5px 5px;
        }

        .figure-grid-item img.lozad:not([src]) {
            min-height: 1000px;
            background-color: #f3f3f3;
        }

        .figure-grid-item img.lozad {
            opacity: 1;
        }

        @media screen and (max-width: 768px) {

            .figure-grid-sizer,
            .figure-grid-item {
                width: 50%;
            }
        }

        @media screen and (max-width: 480px) {

            .figure-grid-sizer,
            .figure-grid-item {
                width: 100%;
            }
        }

        .image-link img {
            transition: transform 0.3s ease-in-out;
        }

        .image-link img:hover {
            transform: scale(1.05);
        }
    </style>
    <script>
        window.addEventListener('error', function (e) {
            if (e.target.tagName === 'IMG') {
                console.error('图片加载失败:', e.target.src);
            }
        }, true);
    </script>
</head>

<body>
    {{ content }}
    <script>
        console.log('脚本块开始执行');

        console.log('检查依赖项:');
        console.log('Masonry: ' + (typeof Masonry !== 'undefined'));
        console.log('imagesLoaded: ' + (typeof imagesLoaded !== 'undefined'));
        console.log('lozad: ' + (typeof lozad !== 'undefined'));

        function initializeGallery() {
            console.log('开始初始化图片库');

            setTimeout(() => {
                var grid = document.querySelector('.figure-grid');
                if (!grid) {
                    console.error('找不到图片网格容器 (.figure-grid)');
                    return;
                }

                var msnry = new Masonry(grid, {
                    itemSelector: '.figure-grid-item',
                    columnWidth: '.figure-grid-sizer',
                    percentPosition: true,
                    transitionDuration: 0
                });

                const observer = lozad('.lozad', {
                    loaded: function (el) {
                        el.classList.add('loaded');
                        msnry.layout();
                        console.log('图片已加载:', el.dataset.src);
                    },
                    error: function (el) {
                        console.error('图片加载失败:', el.dataset.src);
                    }
                });

                observer.observe();

                imagesLoaded(grid).on('always', function () {
                    msnry.layout();
                    msnry.options.transitionDuration = '0.3s';
                    console.log('所有图片加载完成，布局已更新');
                });
            }, 100);
        }

        if (document.readyState === 'loading') {
            console.log('等待 DOM 加载完成...');
            document.addEventListener('DOMContentLoaded', initializeGallery);
        } else {
            console.log('DOM 已加载，直接初始化');
            initializeGallery();
        }

        window.addEventListener('load', function () {
            console.log('页面完全加载完成');
        });
    </script>

    <script src="/assets/js/lightbox-plus-jquery.js"></script>
    <script>
        lightbox.option({
            'resizeDuration': 200,
            'wrapAround': true,
            'fitImagesInViewport': true,
            'disableScrolling': true
        });
        console.log('Lightbox 配置完成');
    </script>
</body>
