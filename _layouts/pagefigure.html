---
layout: pagegallery
---

<head>
    <link href="/assets/js/lightbox.css" rel="stylesheet" />
    <style>
        .figure-grid {
            margin: 0 auto;
        }

        .figure-grid img {
            width: 100%;
            break-inside: avoid;
        }

        .figure-grid a {
            text-decoration: none;
            border: none;
            outline: none;
        }

        .figure-grid a img {
            display: block;
            width: 100%;
            break-inside: avoid;
        }

        .figure-grid a::after {
            content: none !important;
        }

        .figure-grid-sizer,
        .figure-grid-item {
            width: 33.333%;
        }

        .figure-grid-item img {
            width: 100%;
            height: auto;
            display: block;
            padding: 5px 5px;
        }

        .figure-grid-item img.lozad:not([src]) {
            min-height: 1000px;
            background-color: #f3f3f3;
        }

        .figure-grid-item img.lozad {
            opacity: 1;
        }

        @media screen and (max-width: 768px) {

            .figure-grid-sizer,
            .figure-grid-item {
                width: 50%;
            }
        }

        @media screen and (max-width: 480px) {

            .figure-grid-sizer,
            .figure-grid-item {
                width: 100%;
            }
        }

        .image-link img {
            transition: transform 0.3s ease-in-out;
        }

        .image-link img:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    {{ content }}
    <script src="/assets/js/lozad.js"></script>
    <script src="/assets/js/masonry.pkgd.min.js"></script>
    <script src="/assets/js/imagesloaded.pkgd.min.js"></script>
    <script>
        if (!window.masonryInstance) {
            var grid = document.querySelector('.figure-grid');
            window.masonryInstance = new Masonry(grid, {
                itemSelector: '.figure-grid-item',
                columnWidth: '.figure-grid-sizer',
                percentPosition: true
            });

            if (!window.lazyLoadObserver) {
                window.lazyLoadObserver = lozad('.lozad', {
                    rootMargin: '50px 0px',
                    threshold: 0.1,
                    loaded: function (el) {
                        console.log('图片加载完成:', el.getAttribute('data-src'));
                        el.classList.add('loaded');
                        window.masonryInstance.layout();
                    }
                });

                window.lazyLoadObserver.observe();
                console.log('已初始化懒加载观察器');
            }

            imagesLoaded(grid).on('progress', function (instance, image) {
                console.log('图片加载进度:', image.img.src);
                if (image.isLoaded) {
                    window.masonryInstance.layout();
                }
            });

            window.addEventListener('load', function () {
                const images = document.querySelectorAll('.lozad');
                console.log('发现懒加载图片数量:', images.length);
                window.lazyLoadObserver.observe();
                window.masonryInstance.layout();
            });
        }
    </script>

    <script src="/assets/js/lightbox-plus-jquery.js"></script>
    <script>
        lightbox.option({
            'resizeDuration': 200,
            'wrapAround': true,
            'fitImagesInViewport': true,
            'disableScrolling': true
        });
    </script>
</body>
