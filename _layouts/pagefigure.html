---
layout: pagegallery
---

<head>
    <link href="/assets/js/lightbox.css" rel="stylesheet" />
    <script src="/assets/js/lightbox-plus-jquery.js"></script>
    <script defer src="/assets/js/lozad.js"></script>
    <script defer src="/assets/js/masonry.pkgd.min.js"></script>
    <script defer src="/assets/js/imagesloaded.pkgd.min.js"></script>
    <script>
        console.log('页面开始加载');
        window.addEventListener('error', function (e) {
            console.error('脚本加载错误:', e);
        }, true);

        // 确保所有必需的脚本都已加载
        function checkScriptsLoaded() {
            return typeof Masonry !== 'undefined' &&
                typeof imagesLoaded !== 'undefined' &&
                typeof lozad !== 'undefined';
        }
    </script>
    <style>
        .figure-grid {
            margin: 0 auto;
        }

        .figure-grid img {
            width: 100%;
            /* 使图片响应式 */
            break-inside: avoid;
            /* 防止图片在列中断开 */
        }

        .figure-grid a {
            text-decoration: none;
            /* 移除链接下划线 */
            border: none;
            /* 移除链接边框 */
            outline: none;
            /* 移除点击时的轮廓 */
        }

        .figure-grid a img {
            display: block;
            /* 防止图片下方出现间隙 */
            width: 100%;
            /* 使图片响应式 */
            break-inside: avoid;
            /* 防止图片在列中断开 */
        }

        .figure-grid a::after {
            content: none !important;
            /* 移除伪元的内容 */
        }

        .figure-grid-sizer,
        .figure-grid-item {
            width: 33.333%;
        }

        .figure-grid-item img {
            width: 100%;
            height: auto;
            display: block;
            padding: 5px 5px;
            /* 增加左右内边距 */
        }

        /* 修改：设置懒加载时的占位高度 */
        .figure-grid-item img.lozad:not([src]) {
            min-height: 1000px;
            background-color: #f3f3f3;
        }

        .figure-grid-item img.lozad {
            opacity: 1;
        }

        @media screen and (max-width: 768px) {

            .figure-grid-sizer,
            .figure-grid-item {
                width: 50%;
            }
        }

        @media screen and (max-width: 480px) {

            .figure-grid-sizer,
            .figure-grid-item {
                width: 100%;
            }
        }

        .image-link img {
            transition: transform 0.3s ease-in-out;
            /* 添加平滑的过渡效果 */
        }

        .image-link img:hover {
            transform: scale(1.05);
            /* 鼠标悬停时放大图片 */
        }
    </style>
</head>

<body>
    {{ content }}
    <script>
        // 修改初始化函数，添加错误处理
        function initializeGallery() {
            console.log('开始初始化图片库');

            try {
                if (!checkScriptsLoaded()) {
                    throw new Error('必需的脚本未完全加载');
                }

                var grid = document.querySelector('.figure-grid');
                if (!grid) {
                    throw new Error('找不到图片网格容器 (.figure-grid)');
                }

                // 初始化 Masonry
                var msnry = new Masonry(grid, {
                    itemSelector: '.figure-grid-item',
                    columnWidth: '.figure-grid-sizer',
                    percentPosition: true,
                    transitionDuration: 0
                });

                // 初始化 lozad
                const observer = lozad('.lozad', {
                    loaded: function (el) {
                        el.classList.add('loaded');
                        msnry.layout();
                        console.log('图片已加载:', el.dataset.src);
                    }
                });
                observer.observe();

                // 使用 imagesLoaded
                imagesLoaded(grid).on('always', function () {
                    msnry.layout();
                    msnry.options.transitionDuration = '0.3s';
                    console.log('所有图片加载完成');
                });
            } catch (error) {
                console.error('初始化图片库时出错:', error);
            }
        }

        // 确保 DOM 加载完成后再初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeGallery);
        } else {
            initializeGallery();
        }
    </script>
</body>
