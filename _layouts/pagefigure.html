---
layout: pagegallery
---

<head>
    <link href="/assets/js/lightbox.css" rel="stylesheet" />
    <script>console.log('页面开始加载');</script>
    <script src="/assets/js/lozad.js"></script>
    <script src="/assets/js/masonry.pkgd.min.js"></script>
    <script src="/assets/js/imagesloaded.pkgd.min.js"></script>
    <style>
        .figure-grid {
            margin: 0 auto;
        }

        .figure-grid img {
            width: 100%;
            /* 使图片响应式 */
            break-inside: avoid;
            /* 防止图片在列中断开 */
        }

        .figure-grid a {
            text-decoration: none;
            /* 移除链接下划线 */
            border: none;
            /* 移除链接边框 */
            outline: none;
            /* 移除点击时的轮廓 */
        }

        .figure-grid a img {
            display: block;
            /* 防止图片下方出现间隙 */
            width: 100%;
            /* 使图片响应式 */
            break-inside: avoid;
            /* 防止图片在列中断开 */
        }

        .figure-grid a::after {
            content: none !important;
            /* 移除伪元的内容 */
        }

        .figure-grid-sizer,
        .figure-grid-item {
            width: 33.333%;
        }

        .figure-grid-item img {
            width: 100%;
            height: auto;
            display: block;
            padding: 5px 5px;
            /* 增加左右内边距 */
        }

        /* 修改：设置懒加载时的占位高度 */
        .figure-grid-item img.lozad:not([src]) {
            min-height: 1000px;
            background-color: #f3f3f3;
        }

        .figure-grid-item img.lozad {
            opacity: 1;
        }

        @media screen and (max-width: 768px) {

            .figure-grid-sizer,
            .figure-grid-item {
                width: 50%;
            }
        }

        @media screen and (max-width: 480px) {

            .figure-grid-sizer,
            .figure-grid-item {
                width: 100%;
            }
        }

        .image-link img {
            transition: transform 0.3s ease-in-out;
            /* 添加平滑的过渡效果 */
        }

        .image-link img:hover {
            transform: scale(1.05);
            /* 鼠标悬停时放大图片 */
        }
    </style>
</head>

<body>
    {{ content }}
    <script>
        // 立即执行的调试信息
        console.log('脚本块开始执行');

        // 检查必要的依赖
        console.log('检查依赖项:');
        console.log('Masonry: ' + (typeof Masonry !== 'undefined'));
        console.log('imagesLoaded: ' + (typeof imagesLoaded !== 'undefined'));
        console.log('lozad: ' + (typeof lozad !== 'undefined'));

        // 主要初始化函数
        function initializeGallery() {
            console.log('开始初始化图片库');

            // 检查 DOM 元素
            var grid = document.querySelector('.figure-grid');
            console.log('找到 Grid 元素: ' + (grid ? 'yes' : 'no'));

            if (!grid) {
                console.warn('未找到 .figure-grid 元素，终止初始化');
                return;
            }

            // 检查图片元素
            const images = document.querySelectorAll('.lozad');
            console.log(`找到 ${images.length} 个懒加载图片`);

            // 输出每个图片的信息
            images.forEach((img, index) => {
                console.log(`图片 ${index + 1} 信息: ${img.dataset.src}`);
            });

            try {
                console.log('开始初始化 Masonry');
                var msnry = new Masonry(grid, {
                    itemSelector: '.figure-grid-item',
                    columnWidth: '.figure-grid-sizer',
                    percentPosition: true
                });
                console.log('Masonry 初始化成功');

                // 初始化懒加载
                console.log('开始初始化 Lozad');
                const observer = lozad('.lozad', {
                    loaded: function (el) {
                        console.log(`图片加载事件触发: ${el.dataset.src}`);
                        msnry.layout();
                    }
                });

                observer.observe();
                console.log('Lozad 观察器启动成功');

                // 监听所有图片加载
                imagesLoaded(grid).on('progress', function (instance, image) {
                    console.log(`图片加载进度更新: ${image.img.src}`);
                    msnry.layout();
                }).on('always', function () {
                    console.log('所有图片加载完成');
                    msnry.layout();
                });

            } catch (error) {
                console.error('初始化过程中发生错误:', error);
                console.log(`错误详情: ${error.message}`);
                console.log(`错误堆栈: ${error.stack}`);
            }
        }

        // 确保在 DOM 加载完成后执行
        if (document.readyState === 'loading') {
            console.log('等待 DOM 加载完成...');
            document.addEventListener('DOMContentLoaded', initializeGallery);
        } else {
            console.log('DOM 已加载，直接初始化');
            initializeGallery();
        }

        // 添加页面加载完成的检查
        window.addEventListener('load', function () {
            console.log('页面完全加载完成');
        });
    </script>

    <script src="/assets/js/lightbox-plus-jquery.js"></script>
    <script>
        lightbox.option({
            'resizeDuration': 200,
            'wrapAround': true,
            'fitImagesInViewport': true,
            'disableScrolling': true
        });
        console.log('Lightbox 配置完成');
    </script>
</body>
