---
layout: pagegallery
---

<head>
    <link href="\assets\js\lightbox.css" rel="stylesheet" />
    <script src="/assets/js/lozad.js"></script>
    <script src="/assets/js/masonry.pkgd.min.js"></script>
    <script src="/assets/js/imagesloaded.pkgd.min.js"></script>
    <style>
        .figure-grid {
            margin: 0 auto;
        }

        .figure-grid img {
            width: 100%;
            /* 使图片响应式 */
            break-inside: avoid;
            /* 防止图片在列中断开 */
        }

        .figure-grid a {
            text-decoration: none;
            /* 移除链接下划线 */
            border: none;
            /* 移除链接边框 */
            outline: none;
            /* 移除点击时的轮廓 */
        }

        .figure-grid a img {
            display: block;
            /* 防止图片下方出现间隙 */
            width: 100%;
            /* 使图片响应式 */
            break-inside: avoid;
            /* 防止图片在列中断开 */
        }

        .figure-grid a::after {
            content: none !important;
            /* 移除伪元素的内容 */
        }

        .figure-grid-sizer,
        .figure-grid-item {
            width: 33.333%;
        }

        .figure-grid-item img {
            width: 100%;
            height: auto;
            display: block;
            padding: 5px 5px;
            /* 增加左右内边距 */
        }

        /* 修改：设置懒加载时的占位高度 */
        .figure-grid-item img.lozad:not([src]) {
            min-height: 1000px;
            background-color: #f3f3f3;
        }

        .figure-grid-item img.lozad {
            opacity: 1;
        }

        @media screen and (max-width: 768px) {

            .figure-grid-sizer,
            .figure-grid-item {
                width: 50%;
            }
        }

        @media screen and (max-width: 480px) {

            .figure-grid-sizer,
            .figure-grid-item {
                width: 100%;
            }
        }

        .image-link img {
            transition: transform 0.3s ease-in-out;
            /* 添加平滑的过渡效果 */
        }

        .image-link img:hover {
            transform: scale(1.05);
            /* 鼠标悬停时放大图片 */
        }
    </style>
</head>

<body>
    {{ content }}
    <script>
        var grid = document.querySelector('.figure-grid');
        // 初始化 Masonry
        var msnry = new Masonry(grid, {
            itemSelector: '.figure-grid-item',
            columnWidth: '.figure-grid-sizer',
            percentPosition: true
        });

        // 初始化懒加载
        try {
            const observer = lozad('.lozad', {
                loaded: function (el) {
                    // 图片加载完成后重新布局
                    imagesLoaded(el, function () {
                        msnry.layout();
                    });
                }
            });

            // 开始观察
            if (typeof observer.observe === 'function') {
                observer.observe();
            } else {
                console.error('Lozad observer not properly initialized');
            }
        } catch (error) {
            console.error('Error initializing lozad:', error);
        }

        // 监听所有图片加载
        imagesLoaded(grid).on('progress', function (instance, image) {
            msnry.layout();
        }).on('always', function () {
            msnry.layout();
        });

        window.addEventListener('load', function () {
            // 窗口大小改变时重新布局
            window.addEventListener('resize', debounce(function () {
                msnry.layout();
            }, 250));
        });

        // 防抖函数
        function debounce(func, wait) {
            let timeout;
            return function () {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, arguments), wait);
            };
        }
    </script>
    <script src="\assets\js\lightbox-plus-jquery.js"></script>
    <script>
        lightbox.option({
            'resizeDuration': 200,
            'wrapAround': true,
            'fitImagesInViewport': true,
            'disableScrolling': true
        });
    </script>
</body>
