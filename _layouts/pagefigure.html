---
layout: pagegallery
---

<head>
    <style>

    .figure-grid {
        margin: 0 auto; /* 水平居中 */
    }

    .figure-grid img {
        width: 100%; /* 使图片响应式 */
        break-inside: avoid; /* 防止图片在列中断开 */
    }

    .figure-grid a {
        text-decoration: none; /* 移除链接下划线 */
        border: none; /* 移除链接边框 */
        outline: none; /* 移除点击时的轮廓 */
    }

    .figure-grid a img {
        display: block; /* 防止图片下方出现间隙 */
        width: 100%; /* 使图片响应式 */
        break-inside: avoid; /* 防止图片在列中断开 */
    }

    .figure-grid a::after {
        content: none !important;; /* 移除伪元素的内容 */
    }   

    .figure-grid-sizer,
    .figure-grid-item {
        width: 33.333%; /* 三列布局 */
    }

    .figure-grid-item {
        padding: 5px 5px; /* 增加左右内边距 */
        box-sizing: border-box; /* 确保内边距不会增加元素的总宽度 */
    }

    /* 可选：针对小屏幕调整列数 */
    @media screen and (max-width: 768px) {
        .figure-grid-sizer,
        .figure-grid-item {
            width: 50%; /* 小屏幕上一列布局 */
        }
    }

    @media screen and (max-width: 480px) {
        .figure-grid-sizer,
        .figure-grid-item {
            width: 100%; /* 小屏幕上一列布局 */
        }
    }

    .image-link img {
    transition: transform 0.3s ease-in-out; /* 添加平滑的过渡效果 */
    }

    .image-link img:hover {
    transform: scale(1.05); /* 鼠标悬停时放大图片 */
    }

    /* 模态窗口样式 */
    .modal {
        display: flexbox; /* 使用 flexbox 布局 */
        position: fixed; /* Stay in place */
        z-index: 10000; /* Sit on top */
        left: 0;
        top: 0;
        width: 100%; /* Full width */
        height: 100%; /* Full height */
        overflow: auto; /* Enable scroll if needed */
        background-color: rgba(0,0,0,0.9); /* Black w/ opacity */
        align-items: center; /* 垂直居中 */
        justify-content: center; /* 水平居中 */
    }

    .modal-content {
        margin: auto;
        display: block;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%); /* 新增加的代码行 */
        max-width: 95%; /* 设置最大宽度为视口的90% */
        max-height: 95%; /* 设置最大高度为视口的90% */
        width: auto; /* Add this to maintain aspect ratio */
        height: auto; /* Add this to maintain aspect ratio */
        -webkit-animation-name: zoom;
        -webkit-animation-duration: 0.6s;
        animation-name: zoom;
        animation-duration: 0.6s;
        object-fit: contain; /* This will make sure that the image is contained within the element's box */
        
    }

    @-webkit-keyframes zoom {
        from {
            -webkit-transform: scale(0) translate(-50%, -50%);
            transform: scale(0) translate(-50%, -50%);
        } 
        to {
            -webkit-transform: scale(1) translate(-50%, -50%);
            transform: scale(1) translate(-50%, -50%);
        }
    }
    
    @keyframes zoom {
        from {
            -webkit-transform: scale(0) translate(-50%, -50%);
            transform: scale(0) translate(-50%, -50%);
        } 
        to {
            -webkit-transform: scale(1) translate(-50%, -50%);
            transform: scale(1) translate(-50%, -50%);
        }
    }

    /* The Close Button */
    .close {
    position: absolute;
    top: 15px;
    right: 35px;
    color: #f1f1f1;
    font-size: 40px;
    font-weight: bold;
    transition: 0.3s;
    cursor: pointer;
    }

    .close:hover,
    .close:focus {
    color: #bbb;
    text-decoration: none;
    cursor: pointer;
    }

    </style>
</head>

<body>
    {{ content }}
    <script src="/assets/js/figure.js"></script>
    <!-- 引入 Masonry -->
    <script src="/assets/js/masonry.pkgd.min.js"></script>
    <!-- 引入 imagesLoaded -->
    <script src="/assets/js/imagesLoaded.pkgd.min.js"></script>
    <script>
        var grid = document.querySelector('.figure-grid');
        var msnry = new Masonry(grid, {
        itemSelector: '.figure-grid-item',
        columnWidth: '.figure-grid-sizer',
        percentPosition: true
        });

        imagesLoaded(grid).on('progress', function(instance, image) {
            console.log('image is loaded');
            msnry.layout(); 
        }).on('always', function() {
            msnry.layout(); 
            console.log('all images loaded');
        });

        window.addEventListener('load', function() {
            msnry.layout();
        });
        console.log('Masonry initialized');
    </script>
</body>
