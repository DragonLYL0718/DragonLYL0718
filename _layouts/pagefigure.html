---
layout: pagegallery
---

<head>
    <style>
    /* 模态窗口样式 */
    .modal {
        display: none; /* Hidden by default */
        position: fixed; /* Stay in place */
        z-index: 10; /* Sit on top */
        left: 0;
        top: 0;
        width: 100%; /* Full width */
        height: 100%; /* Full height */
        overflow: auto; /* Enable scroll if needed */
        background-color: rgba(0,0,0,0.9); /* Black w/ opacity */
        display: flex; /* 使用 flexbox 布局 */
        align-items: center; /* 垂直居中 */
        justify-content: center; /* 水平居中 */
    }

    .modal-content {
        margin: auto;
        display: block;
        max-width: 90%; /* 设置最大宽度为视口的90% */
        max-height: 90%; /* 设置最大高度为视口的90% */
        -webkit-animation-name: zoom;
        -webkit-animation-duration: 0.6s;
        animation-name: zoom;
        animation-duration: 0.6s;
    }

    @-webkit-keyframes zoom {
    from {-webkit-transform:scale(0)} 
    to {-webkit-transform:scale(1)}
    }
    
    @keyframes zoom {
    from {transform:scale(0)} 
    to {transform:scale(1)}
    }

    /* The Close Button */
    .close {
    position: absolute;
    top: 15px;
    right: 35px;
    color: #f1f1f1;
    font-size: 40px;
    font-weight: bold;
    transition: 0.3s;
    cursor: pointer;
    }

    .close:hover,
    .close:focus {
    color: #bbb;
    text-decoration: none;
    cursor: pointer;
    }

    </style>
</head>

<!-- 在页面底部或外部 JavaScript 文件中添加脚本 -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 创建模态窗口和图片元素
        var modal = document.createElement('div');
        modal.classList.add('modal');
        modal.innerHTML = '<span class="close">&times;</span><img class="modal-content" id="modal-image">';
        document.body.appendChild(modal);

        // 获取模态窗口元素和关闭按钮
        var modalImg = document.getElementById("modal-image");
        var closeBtn = document.querySelector('.modal .close');

        // 函数：打开模态窗口
        function openModal(imageSrc) {
            modal.style.display = "block";
            modalImg.src = imageSrc;
        }

        // 为每个图片链接添加点击事件监听器
        document.querySelectorAll('.image-link').forEach(function(link) {
            link.addEventListener('click', function(event) {
            event.preventDefault(); // 阻止链接默认打开新标签页的行为
            openModal(this.href); // 传递原图链接到打开模态窗口的函数
            });
        });

        // 点击关闭按钮隐藏模态窗口
        closeBtn.addEventListener('click', function() {
            modal.style.display = "none";
        });
    });
</script>

<body>
    {{ content }}
</body>
