---
layout: pagegallery
---

<head>
    <link href="/assets/js/lightbox.css" rel="stylesheet" />
    <style>
        .figure-grid {
            margin: 0 auto;
        }

        .figure-grid img {
            width: 100%;
            break-inside: avoid;
        }

        .figure-grid a {
            text-decoration: none;
            border: none;
            outline: none;
        }

        .figure-grid a img {
            display: block;
            width: 100%;
            break-inside: avoid;
        }

        .figure-grid a::after {
            content: none !important;
        }

        .figure-grid-sizer,
        .figure-grid-item {
            width: 33.333%;
        }

        .figure-grid-item img {
            width: 100%;
            height: auto;
            display: block;
            padding: 5px 5px;
        }

        .figure-grid-item img.lozad:not([src]) {
            min-height: 1000px;
            background-color: #f3f3f3;
        }

        .figure-grid-item img.lozad {
            opacity: 1;
        }

        @media screen and (max-width: 768px) {

            .figure-grid-sizer,
            .figure-grid-item {
                width: 50%;
            }
        }

        @media screen and (max-width: 480px) {

            .figure-grid-sizer,
            .figure-grid-item {
                width: 100%;
            }
        }

        .image-link img {
            transition: transform 0.3s ease-in-out;
        }

        .image-link img:hover {
            transform: scale(1.05);
        }
    </style>
    <script>
        window.addEventListener('error', function (e) {
            if (e.target.tagName === 'IMG') {
                console.error('图片加载失败:', e.target.src);
            }
        }, true);
    </script>
</head>

<body>
    {{ content }}
    <script defer src="/assets/js/lozad.js"></script>
    <script defer src="/assets/js/masonry.pkgd.min.js"></script>
    <script defer src="/assets/js/imagesloaded.pkgd.min.js"></script>
    <script>
        var grid = document.querySelector('.figure-grid');
        var msnry = new Masonry(grid, {
            itemSelector: '.figure-grid-item',
            columnWidth: '.figure-grid-sizer',
            percentPosition: true
        });

        imagesLoaded(grid).on('progress', function (instance, image) {
            msnry.layout();
        }).on('always', function () {
            msnry.layout();
        });


        // 延迟加载图片
        const observer = lozad('.lozad', {
            load: function (el) {
                console.log('loading element');
                msnry.layout();
            }
        });
        observer.observe();

        window.addEventListener('load', function () {
            msnry.layout();
        });
    </script>

    <script src="/assets/js/lightbox-plus-jquery.js"></script>
    <script>
        lightbox.option({
            'resizeDuration': 200,
            'wrapAround': true,
            'fitImagesInViewport': true,
            'disableScrolling': true
        });
    </script>
</body>
