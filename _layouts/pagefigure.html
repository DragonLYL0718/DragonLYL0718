---
layout: pagegallery
---

<head>
    <style>
        /* 基础样式 */
        .modal {
            display: none;
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 100000;
            overflow-y: auto; /* 允许在模态内容过高时滚动 */
        }

        .modal:target {
            display: block;
        }

        .modal-content {
            position: fixed; /* 使用fixed定位直接相对于视口定位 */
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            margin: auto; /* 水平和垂直居中 */
            width: auto; /* 使图片自动调整宽度 */
            max-width: 100%; /* 最大宽度不超过视口 */
            height: auto; /* 使图片自动调整高度 */
            max-height: 100%; /* 最大高度不超过视口 */
            overflow: auto; /* 如果需要，提供滚动条 */
            background: none; /* 无背景 */
        }
        
        /* 图片样式 */
        .modal-content img {
            display: block; /* 块级显示 */
            width: auto; /* 自动宽度 */
            max-width: 100%; /* 最大宽度为容器宽度 */
            height: auto; /* 自动高度 */
            max-height: 100%; /* 最大高度为容器高度 */
            margin: auto; /* 居中显示 */
        }

        .close-modal {
            position: fixed; /* 固定定位，总是显示在右上角 */
            top: 10px; /* 与顶部的距离 */
            right: 10px; /* 与右边的距离 */
            width: 32px; /* 宽度 */
            height: 32px; /* 高度 */
            background: #FFFFFF; /* 背景色 */
            border-radius: 16px; /* 圆角 */
            text-align: center; /* 文本居中 */
            line-height: 32px; /* 行高，使×垂直居中 */
            font-size: 24px; /* 字体大小 */
            cursor: pointer; /* 鼠标样式 */
            text-decoration: none; /* 无文本装饰 */
            color: #000000; /* 字体颜色 */
        }

        .close-modal:hover {
            background: #f3f3f3; /* 鼠标悬停时的背景色 */
        }
    </style>
</head>

<body>
    {{ content }}
</body>
